# Example MySQL profile for Zomino backend
spring.datasource.url=jdbc:mysql://localhost:3306/zomino?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Root@123
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Use Hibernate to create/update schema for MySQL (disable Flyway if it's incompatible in this environment)
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=update

# Optional: tune Hikari pool
spring.datasource.hikari.maximum-pool-size=10

# Logging
logging.level.org.flywaydb=INFO
logging.level.org.springframework.jdbc=INFO
