spring.application.name=Backend

# Use Flyway for schema management; disable Hibernate's automatic DDL in environments where Flyway is used
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none

# H2 / JPA settings for development
spring.datasource.url=jdbc:h2:mem:zomino;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server port (default 8080)
server.port=8080

# Logging
logging.level.org.hibernate.SQL=DEBUG
